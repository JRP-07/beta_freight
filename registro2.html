<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variantes de Diseño | Freight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>

        /* --- ESTILO  --- */
        .theme-soft {
            background: #f0f2f5;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .soft-card {
            background: #f0f2f5;
            box-shadow: 20px 20px 60px #ccced0, -20px -20px 60px #ffffff;
            border-radius: 40px;
        }
        .soft-input {
            background: #f0f2f5;
            box-shadow: inset 6px 6px 12px #ccced0, inset -6px -6px 12px #ffffff;
            border: none;
        }
        .soft-button {
            background: #2563eb;
            box-shadow: 6px 6px 12px #ccced0, -6px -6px 12px #ffffff;
        }
        .google-btn-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            background: #f0f2f5;
            box-shadow: 6px 6px 12px #ccced0, -6px -6px 12px #ffffff;
            min-width: 50px;
            min-height: 50px;
        }

        /* Utilidades generales */
        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <section id="soft-theme" class="theme-soft hidden-section min-h-screen flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="soft-card w-full max-w-[460px] p-12">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Únete a Freight</h2>
                <p class="text-slate-500 text-sm font-medium mt-1">Crea una cuenta con un toque suave.</p>
            </div>

            <form class="space-y-8">
                <input type="text" placeholder="Nombre completo" class="soft-input w-full px-6 py-4 rounded-2xl text-slate-700 outline-none placeholder-slate-400">
                <input type="email" placeholder="Correo electrónico" class="soft-input w-full px-6 py-4 rounded-2xl text-slate-700 outline-none placeholder-slate-400">
                <input type="password" placeholder="Crear contraseña" class="soft-input w-full px-6 py-4 rounded-2xl text-slate-700 outline-none placeholder-slate-400">
                
                <button type="button" class="soft-button w-full py-4 rounded-2xl text-white font-bold shadow-lg hover:brightness-110 transition-all active:scale-95">
                    Comenzar ahora
                </button>
            </form>

            <div class="mt-10 text-center">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-6">Conectar con fuente externa</p>
                
                <!-- CONFIGURACIÓN DE GOOGLE -->
                <div id="g_id_onload" 
                     data-client_id="847237081316-35k296a2frdo97cc54051p21ile688e4.apps.googleusercontent.com" 
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>

                <!-- BOTÓN DE GOOGLE CON ATRIBUTOS DE LOGO FORZADOS -->
                <div class="google-btn-wrapper">
                    <div class="g_id_signin" 
                         data-type="icon" 
                         data-shape="circle" 
                         data-theme="filled_blue" 
                         data-size="large"
                         data-logo_alignment="left">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>

        function handleCredentialResponse(response) {
            console.log("Token recibido en el nuevo diseño:", response.credential);
        }
    </script>
</body>
</html>
