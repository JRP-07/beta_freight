<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variantes de Diseño | Freight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILO 1: OSCURO FUTURISTA (DARK TECH) --- */
        .theme-dark {
            background: #020617;
            font-family: 'Outfit', sans-serif;
            color: white;
        }
        .dark-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .dark-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(51, 65, 85, 1);
            color: white;
        }
        .dark-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px #38bdf8;
        }
        .glow-button {
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }

        /* --- ESTILO 2: SOFT MINIMAL (SOFT UI) --- */
        .theme-soft {
            background: #f0f2f5;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .soft-card {
            background: #f0f2f5;
            box-shadow: 20px 20px 60px #ccced0, -20px -20px 60px #ffffff;
            border-radius: 40px;
        }
        .soft-input {
            background: #f0f2f5;
            box-shadow: inset 6px 6px 12px #ccced0, inset -6px -6px 12px #ffffff;
            border: none;
        }
        .soft-button {
            background: #2563eb;
            box-shadow: 6px 6px 12px #ccced0, -6px -6px 12px #ffffff;
        }

        /* Utilidades generales */
        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <section id="soft-theme" class="theme-soft hidden-section min-h-screen flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="soft-card w-full max-w-[460px] p-12">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Únete a Freight</h2>
                <p class="text-slate-500 text-sm font-medium mt-1">Crea una cuenta con un toque suave.</p>
            </div>

            <form class="space-y-8">
                <input type="text" placeholder="Nombre completo" class="soft-input w-full px-6 py-4 rounded-2xl text-slate-700 outline-none placeholder-slate-400">
                <input type="email" placeholder="Correo electrónico" class="soft-input w-full px-6 py-4 rounded-2xl text-slate-700 outline-none placeholder-slate-400">
                <input type="password" placeholder="Crear contraseña" class="soft-input w-full px-6 py-4 rounded-2xl text-slate-700 outline-none placeholder-slate-400">
                
                <button type="button" class="soft-button w-full py-4 rounded-2xl text-white font-bold shadow-lg hover:brightness-110 transition-all active:scale-95">
                    Comenzar ahora
                </button>
            </form>

            <div class="mt-10 text-center">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-6">Redes Sociales</p>
                <div class="flex justify-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-[#f0f2f5] shadow-[4px_4px_8px_#ccced0,-4px_-4px_8px_#ffffff] flex items-center justify-center cursor-pointer">
                        <svg class="w-5 h-5 text-slate-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-2.21 5.42-7.84 5.42-4.84 0-8.79-4.01-8.79-8.92s3.95-8.92 8.79-8.92c2.75 0 4.59 1.14 5.64 2.15l2.58-2.48c-1.66-1.55-3.82-2.49-8.22-2.49-6.62 0-12 5.38-12 12s5.38 12 12 12c6.91 0 11.5-4.86 11.5-11.7 0-.79-.08-1.39-.19-1.98h-11.31z"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function switchTheme(theme) {
            const dark = document.getElementById('dark-theme');
            const soft = document.getElementById('soft-theme');
            
            if(theme === 'dark') {
                dark.classList.remove('hidden-section');
                soft.classList.add('hidden-section');
            } else {
                soft.classList.remove('hidden-section');
                dark.classList.add('hidden-section');
            }
        }

        function handleCredentialResponse(response) {
            console.log("Token recibido en el nuevo diseño:", response.credential);
        }
    </script>
</body>
</html>
