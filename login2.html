<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variantes de Diseño | Freight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .theme-dark {
            background: #020617;
            font-family: 'Outfit', sans-serif;
            color: white;
        }
        .dark-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .dark-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(51, 65, 85, 1);
            color: white;
        }
        .dark-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px #38bdf8;
            outline: none;
        }
        .glow-button {
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }
        .glow-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }
    </style>
</head>
<body class="min-h-screen theme-dark">

    <section id="dark-theme" class="min-h-screen flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="dark-card w-full max-w-[420px] rounded-[2rem] p-10">
            <div class="mb-10">
                <div class="w-12 h-12 bg-sky-500 rounded-lg flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(14,165,233,0.5)]">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h2 class="text-3xl font-bold tracking-tight">System Login</h2>
                <p class="text-slate-400 mt-2 text-sm">Acceso seguro a la terminal Freight.</p>
            </div>

            <!-- Se agregaron IDs correspondientes al Script -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="text-sm font-semibold text-slate-300 ml-1">Correo Electrónico</label>
                    <input type="email" id="logEmail" required placeholder="ejemplo@correo.com" class="dark-input w-full px-5 py-4 rounded-xl outline-none transition-all">
                </div>
                <div>
                    <label class="text-sm font-semibold text-slate-300 ml-1">Contraseña</label>
                    <input type="password" id="logPass" required placeholder="••••••••" class="dark-input w-full px-5 py-4 rounded-xl outline-none transition-all">
                </div>
                <button type="submit" id="submitBtn" class="glow-button w-full py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:opacity-90 transition-all active:scale-95">
                    Execute Login
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 flex flex-col items-center gap-4">
                <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">O entrar con</p>
                <div id="g_id_onload" 
                     data-client_id="847237081316-35k296a2frdo97cc54051p21ile688e4.apps.googleusercontent.com" 
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="filled_blue"></div>
            </div>
            
            <p class="mt-8 text-center text-sm text-slate-500">
                ¿Nuevo en el sistema? <a href="#" class="text-sky-400 font-bold hover:underline">Request Entry</a>
            </p>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithCustomToken, signInAnonymously, GoogleAuthProvider, signInWithCredential } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración de Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Autenticación inicial (Regla 3)
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        const showToast = (msg, isError = false) => {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 ${isError ? 'bg-rose-600' : 'bg-sky-600'} text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold animate-bounce z-50`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        // Manejo de Login Manual
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;

            submitBtn.disabled = true;
            submitBtn.innerText = "AUTHENTICATING...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                if (user) {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile'), {
                        lastLogin: new Date().toISOString()
                    }, { merge: true });
                    
                    showToast("✓ ACCESS GRANTED");
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                }
            } catch (error) {
                console.error(error);
                let errorMsg = "LOGIN ERROR";
                if(error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    errorMsg = "INVALID CREDENTIALS";
                }
                showToast(errorMsg, true);
                submitBtn.disabled = false;
                submitBtn.innerText = "EXECUTE LOGIN";
            }
        });

        // Manejo de Google Auth - Debe ser global para la API de Google
        window.handleCredentialResponse = async (response) => {
            try {
                const credential = GoogleAuthProvider.credential(response.credential);
                const result = await signInWithCredential(auth, credential);
                const user = result.user;

                if (user) {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile'), {
                        fullName: user.displayName,
                        email: user.email,
                        lastLogin: new Date().toISOString()
                    }, { merge: true });

                    showToast("✓ WELCOME " + user.displayName.toUpperCase());
                    setTimeout(() => window.location.href = 'prototipo.html', 1000);
                }
            } catch (error) {
                showToast("GOOGLE ERROR", true);
                console.error(error);
            }
        };
    </script>
</body>
</html>
