<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variantes de Diseño | Freight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILO --- */
        .theme-dark {
            background: #020617;
            font-family: 'Outfit', sans-serif;
            color: white;
        }
        .dark-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .dark-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(51, 65, 85, 1);
            color: white;
        }
        .dark-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px #38bdf8;
        }
        .glow-button {
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }


        /* Utilidades generales */
        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen">


    <!-- LOGIN -->
    <section id="dark-theme" class="theme-dark min-h-screen flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="dark-card w-full max-w-[420px] rounded-[2rem] p-10">
            <div class="mb-10">
                <div class="w-12 h-12 bg-sky-500 rounded-lg flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(14,165,233,0.5)]">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h2 class="text-3xl font-bold tracking-tight">System Login</h2>
                <p class="text-slate-400 mt-2 text-sm">Acceso seguro a la terminal Freight.</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="text sm font semibold text-slate-300">Correo Electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" class="dark-input w-full px-5 py-4 rounded-xl outline-none transition-all">
                </div>
                <div>
                    <label class="text sm font semibold text-slate-300">Contraseña</label>
                    <input type="password" placeholder="••••••••" class="dark-input w-full px-5 py-4 rounded-xl outline-none transition-all">
                </div>
                <button type="button" class="glow-button w-full py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:opacity-90 transition-all active:scale-95">
                    Execute Login
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 flex flex-col items-center gap-4">
                <div id="g_id_onload" data-client_id="847237081316-35k296a2frdo97cc54051p21ile688e4.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="filled_blue"></div>
            </div>
        </div>
    </section>
    <script>
    function redirectToDashboard() {
            // Reemplaza 'dashboard.html' con la URL real de tu página de destino
            window.location.href = 'dashboard.html';
        }

        // Manejador para el login de Google
        function handleCredentialResponse(response) {
            console.log("Token recibido:", response.credential);
            
            // Simular un pequeño retraso para mostrar éxito antes de redirigir
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold animate-bounce";
            toast.innerText = "✓ Autenticado. Redirigiendo...";
            document.body.appendChild(toast);
            
            setTimeout(redirectToDashboard, 1500);
        }

        // Manejador para el formulario manual
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Aquí iría tu lógica de validación o envío a base de datos
            console.log("Formulario enviado, redirigiendo...");
            
            // Redirigir inmediatamente o tras una animación
            redirectToDashboard();
        });

        window.onload = function () {
            if (!window.google) {
                console.warn("El script de Google no se cargó correctamente.");
            }
        }
    </script>
</body>
</html>
