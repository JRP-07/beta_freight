<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | NexusCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Nueva librería de Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(210,100%,93%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(220,100%,95%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(215,100%,92%,1) 0, transparent 50%);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }
        .input-group input {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group input:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .custom-loader {
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo-container {
            width: 48px;
            height: 48px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 py-12">

    <!-- Brand Header -->
    <div class="mb-8 text-center">
        <div class="flex items-center justify-center mb-4">
            <div class="logo-container bg-white rounded-xl shadow-sm p-1 border border-slate-100">
                <img src="recursos/logo_blanco.jpeg" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/48?text=L'">
            </div>
            <span class="ml-3 text-xl font-bold text-slate-900 tracking-tight">Freight</span>
        </div>
    </div>

    <!-- Main Card -->
    <div class="login-card w-full max-w-[480px] rounded-3xl p-8 md:p-10">
        <div class="mb-8 text-center md:text-left">
            <h2 class="text-2xl font-bold text-slate-900">Crear una cuenta</h2>
            <p class="text-slate-500 mt-1 text-sm">Regístrate para comenzar a gestionar tu logística.</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div class="input-group">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Nombre completo</label>
                <input type="text" id="fullname" required placeholder="Juan Pérez"
                    class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white/50 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div class="input-group">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Email corporativo</label>
                <input type="email" id="email" required placeholder="ejemplo@empresa.com"
                    class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white/50 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white/50 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div class="input-group">
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Confirmar</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-white/50 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
            </div>

            <div id="statusBox" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
                <div id="statusContent" class="p-3 rounded-xl bg-rose-50 border border-rose-100 text-rose-600 text-xs font-medium flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span id="statusText">Las contraseñas no coinciden.</span>
                </div>
            </div>

            <button type="submit" id="mainButton" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-2xl transition-all shadow-lg shadow-slate-200 flex items-center justify-center gap-3 active:scale-[0.98] mt-2">
                <span id="buttonLabel">Registrarse con Email</span>
                <span id="loadingSpinner" class="custom-loader"></span>
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-3 text-slate-400 font-bold tracking-widest">o continuar con</span></div>
        </div>

        <!-- Google Login Modernizado -->
        <div class="flex flex-col items-center gap-4">
            <!-- Este div renderiza el botón oficial de Google automáticamente -->
            <div id="g_id_onload"
                 data-client_id="847237081316-35k296a2frdo97cc54051p21ile688e4.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin w-full"
                 data-type="standard"
                 data-size="large"
                 data-theme="outline"
                 data-text="signup_with"
                 data-shape="pill"
                 data-logo_alignment="left"
                 data-width="400">
            </div>
        </div>
    </div>

    <p class="mt-8 text-slate-500 text-sm">
        ¿Ya tienes una cuenta? <a href="#" class="text-slate-900 font-bold hover:underline">Inicia sesión</a>
    </p>

    <script>
        // Función para manejar la respuesta de Google
        function handleCredentialResponse(response) {
            console.log("JWT Token de Google:", response.credential);
            
            // Aquí decodificarías el JWT o lo enviarías a tu backend
            const payload = parseJwt(response.credential);
            console.log("Usuario:", payload.name, payload.email);
            
            // Simular éxito
            document.getElementById('buttonLabel').textContent = '¡Bienvenido ' + payload.given_name + '!';
            document.getElementById('mainButton').classList.replace('bg-slate-900', 'bg-emerald-600');
        }

        // Función auxiliar para leer los datos del token de Google
        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        const authForm = document.getElementById('authForm');
        const mainButton = document.getElementById('mainButton');
        const buttonLabel = document.getElementById('buttonLabel');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (passwordInput.value !== confirmInput.value) {
                statusText.textContent = "Las contraseñas no coinciden.";
                statusBox.classList.remove('hidden');
                return;
            }
            statusBox.classList.add('hidden');
            mainButton.disabled = true;
            buttonLabel.textContent = 'Creando cuenta...';
            loadingSpinner.style.display = 'block';

            setTimeout(() => {
                buttonLabel.textContent = '¡Cuenta creada!';
                mainButton.classList.replace('bg-slate-900', 'bg-emerald-600');
                loadingSpinner.style.display = 'none';
            }, 2000);
        });
    </script>
</body>
</html>
